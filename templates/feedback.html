<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>ご意見・ご感想フォーム</title>
    <style>
        body { font-family: sans-serif; max-width: 500px; margin: 40px auto; padding: 0 20px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input, select, textarea { width: 100%; padding: 8px; box-sizing: border-box; }
        button { background-color: #28a745; color: white; border: none; padding: 10px 15px; cursor: pointer; }
    </style>
</head>
<body>
    <h2>ホテルご意見・ご感想フォーム</h2>
    <form action="/" method="POST">
        <div class="form-group">
            <label>お名前（任意）</label>
            <input type="text" name="name" placeholder="例: 山田太郎">
        </div>
        <div class="form-group">
            <label>評価（5段階）</label>
            <select name="rating">
                <option value="5">★★★★★ (5 - 大変満足)</option>
                <option value="4">★★★★☆ (4 - 満足)</option>
                <option value="3">★★★☆☆ (3 - 普通)</option>
                <option value="2">★★☆☆☆ (2 - 不満)</option>
                <option value="1">★☆☆☆☆ (1 - 大変不満)</option>
            </select>
        </div>
        <div class="form-group">
            <label>ご意見・ご要望</label>
            <textarea name="comment" rows="4" required></textarea>
        </div>
        <button type="submit">送信する</button>
    </form>
    <p style="margin-top: 30px;"><a href="/admin">＞ マネージャー用管理画面はこちら</a></p>
</body>
</html>
